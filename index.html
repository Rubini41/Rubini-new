<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:10px;
}

h2{
    color:#003366;
    font-size:18px;
    margin-bottom:20px;
}

label{
    display:block;
    text-align:left;
    font-weight:bold;
    margin-top:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>

</head>

<body>

<div class="container">

    <!-- College Logo -->
    <img src="college logo.png" class="logo" alt="College Logo">

    <!-- College Name -->
    <h2>Adhiparasakthi Engineering College</h2>

    <!-- Demo Form -->
    <form>

        <label>Student Name</label>
        <input type="text" placeholder="Enter Student Name">

        <label>Password</label>
        <input type="password" placeholder="Enter Password">

        <button type="button">Login</button>

    </form>

</div>

</body>
</html>
